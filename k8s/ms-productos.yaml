apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-productos
  namespace: ms-pedidos-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-productos
  template:
    metadata:
      labels:
        app: ms-productos
    spec:
      containers:
        - name: ms-productos
          image: ms-productos:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ms-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ms-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: ms-config
                  key: DB_USER
            - name: DB_SSL_MODE
              valueFrom:
                configMapKeyRef:
                  name: ms-config
                  key: DB_SSL_MODE
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ms-db-secret
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: ms-productos
  namespace: ms-pedidos-ns
spec:
  selector:
    app: ms-productos
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
