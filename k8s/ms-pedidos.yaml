apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-pedidos
  namespace: ms-pedidos-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-pedidos
  template:
    metadata:
      labels:
        app: ms-pedidos
    spec:
      containers:
        - name: ms-pedidos
          image: ms-pedidos:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: PRODUCTOS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ms-config
                  key: PRODUCTOS_SERVICE_URL
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ms-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ms-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: ms-config
                  key: DB_USER
            - name: DB_SSL_MODE
              valueFrom:
                configMapKeyRef:
                  name: ms-config
                  key: DB_SSL_MODE
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ms-db-secret
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: ms-pedidos
  namespace: ms-pedidos-ns
spec:
  selector:
    app: ms-pedidos
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ms-pedidos-lb
  namespace: ms-pedidos-ns
spec:
  selector:
    app: ms-pedidos
  ports:
    - port: 8082
      targetPort: 8082
  type: LoadBalancer
